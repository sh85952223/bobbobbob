<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{--ink:#433753;--muted:#817693;--purple:#7d65b1;--purple2:#b49ce0;--mint:#a8d8cd;--white:rgba(255,255,255,.88);--line:rgba(104,84,137,.1)}
    *{box-sizing:border-box}
    body{margin:0;padding:10px;font-family:Pretendard,"Noto Sans KR",sans-serif;color:var(--ink);background:transparent}
    button,select{font:inherit}
    .widget{max-width:920px;margin:auto;padding:24px;border:1px solid rgba(255,255,255,.75);border-radius:28px;background:radial-gradient(circle at 90% 5%,rgba(168,216,205,.36),transparent 28%),linear-gradient(145deg,#f5efff,#e9f5f2);box-shadow:0 18px 50px rgba(92,70,128,.13)}
    .header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .eyebrow{display:inline-block;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.72);font-size:11px;font-weight:800;letter-spacing:.08em;color:#77658f}
    h1{margin:12px 0 6px;font-size:clamp(25px,4.5vw,38px);letter-spacing:-.045em}
    .subtitle{margin:0;color:var(--muted);font-size:14px;line-height:1.55}
    .date{padding:13px 15px;border-radius:18px;background:rgba(255,255,255,.72);text-align:center;min-width:128px}
    .date strong,.date span{display:block}.date span{margin-top:4px;font-size:11px;color:var(--muted)}
    .vote-card{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;margin:18px 0 12px;padding:20px;border:1px solid rgba(255,255,255,.86);border-radius:24px;background:var(--white);box-shadow:0 10px 28px rgba(83,62,117,.07)}
    .vote-copy h2{margin:0 0 6px;font-size:18px;letter-spacing:-.03em}.vote-copy p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
    .vote-date{display:inline-flex;margin-top:10px;padding:6px 10px;border-radius:999px;background:#eee7f8;color:#725f94;font-size:11px;font-weight:800}
    .vote-form{grid-column:1/-1;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px}
    .select-wrap{position:relative}.select-wrap:after{content:"⌄";position:absolute;right:15px;top:50%;transform:translateY(-54%);pointer-events:none;color:#76658f;font-weight:900}
    select{width:100%;height:48px;padding:0 42px 0 15px;border:1px solid rgba(104,84,137,.18);border-radius:15px;outline:none;appearance:none;background:#fff;color:var(--ink)}
    select:focus{border-color:#9c84ca;box-shadow:0 0 0 4px rgba(156,132,202,.13)}
    .vote-button,.refresh{border:0;border-radius:999px;background:var(--purple);color:#fff;font-weight:800;cursor:pointer}
    .vote-button{min-width:112px;padding:0 18px}.refresh{padding:10px 15px}
    .vote-button:disabled,.refresh:disabled,select:disabled{opacity:.55;cursor:default}
    .vote-status{grid-column:1/-1;min-height:19px;margin:0;font-size:12px;color:var(--muted)}
    .vote-status.success{color:#39796c;font-weight:800}.vote-status.error{color:#a54862;font-weight:800}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:12px 0;padding:14px 16px;border-radius:20px;background:var(--white)}
    .toolbar small{color:var(--muted)}
    .panel{padding:12px 16px;border-radius:22px;background:var(--white)}
    .row{display:grid;grid-template-columns:42px minmax(110px,1.2fr) minmax(120px,3.5fr) 75px;align-items:center;gap:12px;min-height:68px;border-bottom:1px solid var(--line)}
    .row:last-child{border-bottom:0}.rank{display:grid;place-items:center;width:36px;height:36px;border-radius:13px;background:linear-gradient(145deg,#8870bd,var(--purple2));color:#fff;font-weight:900}.name{font-weight:800}.track{height:14px;border-radius:999px;background:#eee8f4;overflow:hidden}.fill{height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,#8870bd,var(--purple2));transition:width .7s ease}.score{text-align:right}.score strong,.score span{display:block}.score span{font-size:11px;color:var(--muted)}
    .empty{padding:42px 18px;text-align:center;color:var(--muted);line-height:1.65}
    .footer{display:flex;justify-content:space-between;gap:10px;margin-top:12px;font-size:11px;color:var(--muted)}
    @media(max-width:650px){.widget{padding:18px}.header{flex-direction:column}.date{align-self:stretch}.vote-card{grid-template-columns:1fr}.vote-form{grid-template-columns:1fr}.vote-button{height:46px}.row{grid-template-columns:36px minmax(0,1fr) 66px}.track{grid-column:2/4;margin-top:-8px}.toolbar{align-items:flex-start;flex-direction:column}.refresh{width:100%}.footer{flex-direction:column}}
  </style>
</head>
<body>
  <main class="widget">
    <header class="header">
      <div>
        <span class="eyebrow">YULLYANG LUNCH PICK</span>
        <h1>급식 기대 메뉴</h1>
        <p class="subtitle" id="subtitle">친구들이 가장 기다리는 메뉴를 확인해 보세요.</p>
      </div>
      <div class="date"><strong id="dateLabel">오늘</strong><span id="periodLabel">투표 결과</span></div>
    </header>

    <section class="vote-card" aria-labelledby="voteTitle">
      <div class="vote-copy">
        <h2 id="voteTitle">오늘 기대되는 메뉴에 투표해요</h2>
        <p id="voteHelp">급식 메뉴를 불러오고 있습니다.</p>
        <span class="vote-date" id="voteDateLabel">투표 준비 중</span>
      </div>
      <form class="vote-form" id="voteForm">
        <div class="select-wrap">
          <label for="menuSelect" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">급식 메뉴 선택</label>
          <select id="menuSelect" name="menu" disabled>
            <option value="">메뉴를 불러오는 중입니다</option>
          </select>
        </div>
        <button class="vote-button" id="voteButton" type="submit" disabled>투표하기</button>
        <p class="vote-status" id="voteStatus" aria-live="polite"></p>
      </form>
    </section>

    <section class="toolbar">
      <div><strong id="totalResponses">0명 참여</strong><br><small id="updatedAt">불러오는 중</small></div>
      <button class="refresh" id="refreshButton" type="button">↻ 지금 갱신</button>
    </section>

    <section class="panel" id="chart"><div class="empty">데이터를 불러오고 있어요.</div></section>
    <footer class="footer"><span>차트 자동 갱신: 12시간마다</span><span>주말 투표는 돌아오는 월요일 결과에 합산</span></footer>
  </main>

  <script>
    const REFRESH_INTERVAL_MS = 12 * 60 * 60 * 1000;
    let dashboardLoading = false;
    let voteSubmitting = false;
    let voteTargetDate = '';

    const refreshButton = document.getElementById('refreshButton');
    const voteForm = document.getElementById('voteForm');
    const menuSelect = document.getElementById('menuSelect');
    const voteButton = document.getElementById('voteButton');
    const voteStatus = document.getElementById('voteStatus');

    document.addEventListener('DOMContentLoaded', () => {
      refreshButton.addEventListener('click', refreshAll);
      voteForm.addEventListener('submit', submitVote);
      refreshAll();
      setInterval(() => { if (!document.hidden) refreshAll(); }, REFRESH_INTERVAL_MS);
    });

    function refreshAll() {
      loadDashboard();
      loadVotePanel();
    }

    function loadDashboard() {
      if (dashboardLoading) return;
      dashboardLoading = true;
      refreshButton.disabled = true;
      refreshButton.textContent = '↻ 갱신 중';

      google.script.run
        .withSuccessHandler((data) => {
          dashboardLoading = false;
          restoreRefreshButton();
          renderDashboard(data);
        })
        .withFailureHandler((error) => {
          dashboardLoading = false;
          restoreRefreshButton();
          showChartError(error);
        })
        .getDashboardData();
    }

    function loadVotePanel() {
      google.script.run
        .withSuccessHandler(renderVotePanel)
        .withFailureHandler((error) => {
          disableVotePanel('투표 메뉴를 불러오지 못했습니다.');
          setVoteStatus(error && error.message ? error.message : String(error), 'error');
        })
        .getVotePanelData();
    }

    function renderVotePanel(data) {
      voteTargetDate = data && data.date ? data.date : '';
      document.getElementById('voteDateLabel').textContent = data && data.dateLabel ? data.dateLabel : '투표 준비 중';
      document.getElementById('voteHelp').textContent = data && data.message ? data.message : '메뉴를 하나 선택해 주세요.';
      menuSelect.replaceChildren();

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = data && data.available ? '기대되는 메뉴를 선택하세요' : '현재 투표할 수 없습니다';
      menuSelect.appendChild(placeholder);

      if (!data || !data.available || !Array.isArray(data.options)) {
        menuSelect.disabled = true;
        voteButton.disabled = true;
        return;
      }

      data.options.forEach((menu) => {
        const option = document.createElement('option');
        option.value = menu;
        option.textContent = menu;
        menuSelect.appendChild(option);
      });

      menuSelect.disabled = false;
      voteButton.disabled = false;
      setVoteStatus('', '');
    }

    function disableVotePanel(message) {
      menuSelect.replaceChildren();
      const option = document.createElement('option');
      option.value = '';
      option.textContent = message;
      menuSelect.appendChild(option);
      menuSelect.disabled = true;
      voteButton.disabled = true;
    }

    function submitVote(event) {
      event.preventDefault();
      if (voteSubmitting) return;

      const menu = menuSelect.value;
      if (!menu) {
        setVoteStatus('메뉴를 하나 선택해 주세요.', 'error');
        return;
      }

      voteSubmitting = true;
      voteButton.disabled = true;
      voteButton.textContent = '제출 중';
      setVoteStatus('', '');

      google.script.run
        .withSuccessHandler((result) => {
          voteSubmitting = false;
          voteButton.textContent = '투표하기';
          voteButton.disabled = false;
          menuSelect.value = '';
          setVoteStatus(result.message || '투표가 반영되었습니다.', 'success');
          setTimeout(loadDashboard, 700);
        })
        .withFailureHandler((error) => {
          voteSubmitting = false;
          voteButton.textContent = '투표하기';
          voteButton.disabled = false;
          setVoteStatus(error && error.message ? error.message : String(error), 'error');
          loadVotePanel();
        })
        .submitMealVote({ menu, targetDate: voteTargetDate });
    }

    function setVoteStatus(message, type) {
      voteStatus.textContent = message || '';
      voteStatus.className = `vote-status${type ? ` ${type}` : ''}`;
    }

    function restoreRefreshButton() {
      refreshButton.disabled = false;
      refreshButton.textContent = '↻ 지금 갱신';
    }

    function renderDashboard(data) {
      document.getElementById('dateLabel').textContent = data.dateLabel || '오늘';
      document.getElementById('periodLabel').textContent = data.periodLabel || '투표 결과';
      document.getElementById('totalResponses').textContent = `${data.totalResponses || 0}명 참여`;
      document.getElementById('updatedAt').textContent = `${data.updatedAt || '-'} 기준`;
      document.getElementById('subtitle').textContent = data.mode === 'WEEKEND_MONDAY'
        ? '돌아오는 월요일 급식을 미리 투표하고 있어요.'
        : '친구들이 가장 기다리는 메뉴를 확인해 보세요.';

      const chart = document.getElementById('chart');
      chart.replaceChildren();

      if (!data.items || !data.items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '아직 투표가 없어요. 첫 번째 메뉴를 골라 주세요.';
        chart.appendChild(empty);
        return;
      }

      const max = Math.max(...data.items.map((item) => Number(item.count) || 0), 1);
      data.items.forEach((item) => {
        const row = document.createElement('article'); row.className = 'row';
        const rank = document.createElement('div'); rank.className = 'rank'; rank.textContent = item.rank;
        const name = document.createElement('div'); name.className = 'name'; name.textContent = item.menu;
        const track = document.createElement('div'); track.className = 'track';
        const fill = document.createElement('div'); fill.className = 'fill'; track.appendChild(fill);
        const score = document.createElement('div'); score.className = 'score';
        const count = document.createElement('strong'); count.textContent = `${item.count}표`;
        const percent = document.createElement('span'); percent.textContent = `${item.percentage}%`;
        score.append(count, percent); row.append(rank, name, track, score); chart.appendChild(row);
        requestAnimationFrame(() => { fill.style.width = `${Math.max(4, item.count / max * 100)}%`; });
      });
    }

    function showChartError(error) {
      const chart = document.getElementById('chart');
      chart.replaceChildren();
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = `차트를 불러오지 못했습니다. ${error && error.message ? error.message : String(error)}`;
      chart.appendChild(empty);
    }
  </script>
</body>
</html>

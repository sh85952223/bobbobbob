<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{box-sizing:border-box}body{margin:0;padding:10px;font-family:Pretendard,"Noto Sans KR",sans-serif;color:#433753;background:transparent}.widget{max-width:920px;margin:auto;padding:24px;border-radius:28px;background:linear-gradient(145deg,#f5efff,#e9f5f2);box-shadow:0 18px 50px rgba(92,70,128,.13)}.header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.eyebrow{display:inline-block;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.72);font-size:11px;font-weight:800;letter-spacing:.08em;color:#77658f}h1{margin:12px 0 6px;font-size:clamp(25px,4.5vw,38px);letter-spacing:-.045em}.subtitle{margin:0;color:#817693;font-size:14px}.date{padding:13px 15px;border-radius:18px;background:rgba(255,255,255,.72);text-align:center;min-width:120px}.date strong,.date span{display:block}.date span{margin-top:4px;font-size:11px;color:#817693}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:18px 0 12px;padding:14px 16px;border-radius:20px;background:rgba(255,255,255,.85)}.toolbar small{color:#817693}.refresh{border:0;border-radius:999px;padding:10px 15px;background:#7d65b1;color:#fff;font-weight:800;cursor:pointer}.refresh:disabled{opacity:.55;cursor:default}.panel{padding:12px 16px;border-radius:22px;background:rgba(255,255,255,.88)}.row{display:grid;grid-template-columns:42px minmax(110px,1.2fr) minmax(120px,3.5fr) 75px;align-items:center;gap:12px;min-height:68px;border-bottom:1px solid rgba(104,84,137,.1)}.row:last-child{border-bottom:0}.rank{display:grid;place-items:center;width:36px;height:36px;border-radius:13px;background:linear-gradient(145deg,#8870bd,#b49ce0);color:#fff;font-weight:900}.name{font-weight:800}.track{height:14px;border-radius:999px;background:#eee8f4;overflow:hidden}.fill{height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,#8870bd,#b49ce0);transition:width .7s ease}.score{text-align:right}.score strong,.score span{display:block}.score span{font-size:11px;color:#817693}.empty{padding:46px 18px;text-align:center;color:#817693}.footer{display:flex;justify-content:space-between;gap:10px;margin-top:12px;font-size:11px;color:#817693}.spin{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:650px){.widget{padding:18px}.header{flex-direction:column}.date{align-self:stretch}.row{grid-template-columns:36px minmax(0,1fr) 66px}.track{grid-column:2/4;margin-top:-8px}.toolbar{align-items:flex-start;flex-direction:column}.refresh{width:100%}.footer{flex-direction:column}}
  </style>
</head>
<body>
  <main class="widget">
    <header class="header">
      <div><span class="eyebrow">YULLYANG LUNCH PICK</span><h1>급식 기대 메뉴</h1><p class="subtitle" id="subtitle">친구들이 가장 기다리는 메뉴를 확인해 보세요.</p></div>
      <div class="date"><strong id="dateLabel">오늘</strong><span id="periodLabel">투표 결과</span></div>
    </header>

    <section class="toolbar">
      <div><strong id="totalResponses">0명 참여</strong><br><small id="updatedAt">불러오는 중</small></div>
      <button class="refresh" id="refreshButton" type="button">↻ 지금 갱신</button>
    </section>

    <section class="panel" id="chart"><div class="empty">데이터를 불러오고 있어요.</div></section>
    <footer class="footer"><span>자동 갱신: 12시간마다</span><span>주말 투표는 돌아오는 월요일 결과에 합산</span></footer>
  </main>

  <script>
    const REFRESH_INTERVAL_MS = 12 * 60 * 60 * 1000;
    let loading = false;
    const button = document.getElementById('refreshButton');

    document.addEventListener('DOMContentLoaded', () => {
      button.addEventListener('click', loadData);
      loadData();
      setInterval(() => { if (!document.hidden) loadData(); }, REFRESH_INTERVAL_MS);
    });

    function loadData() {
      if (loading) return;
      loading = true;
      button.disabled = true;
      button.textContent = '↻ 갱신 중';
      google.script.run
        .withSuccessHandler((data) => { loading = false; restoreButton(); render(data); })
        .withFailureHandler((error) => { loading = false; restoreButton(); showError(error); })
        .getDashboardData();
    }

    function restoreButton() {
      button.disabled = false;
      button.textContent = '↻ 지금 갱신';
    }

    function render(data) {
      document.getElementById('dateLabel').textContent = data.dateLabel || '오늘';
      document.getElementById('periodLabel').textContent = data.periodLabel || '투표 결과';
      document.getElementById('totalResponses').textContent = `${data.totalResponses || 0}명 참여`;
      document.getElementById('updatedAt').textContent = `${data.updatedAt || '-'} 기준`;
      document.getElementById('subtitle').textContent = data.mode === 'WEEKEND_MONDAY'
        ? '돌아오는 월요일 급식을 미리 투표하고 있어요.'
        : '친구들이 가장 기다리는 메뉴를 확인해 보세요.';

      const chart = document.getElementById('chart');
      chart.replaceChildren();

      if (!data.items || !data.items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '아직 투표가 없어요. 첫 번째 메뉴를 골라 주세요.';
        chart.appendChild(empty);
        return;
      }

      const max = Math.max(...data.items.map((item) => Number(item.count) || 0), 1);
      data.items.forEach((item) => {
        const row = document.createElement('article');
        row.className = 'row';
        const rank = document.createElement('div'); rank.className = 'rank'; rank.textContent = item.rank;
        const name = document.createElement('div'); name.className = 'name'; name.textContent = item.menu;
        const track = document.createElement('div'); track.className = 'track';
        const fill = document.createElement('div'); fill.className = 'fill'; track.appendChild(fill);
        const score = document.createElement('div'); score.className = 'score';
        const count = document.createElement('strong'); count.textContent = `${item.count}표`;
        const percent = document.createElement('span'); percent.textContent = `${item.percentage}%`;
        score.append(count, percent); row.append(rank, name, track, score); chart.appendChild(row);
        requestAnimationFrame(() => { fill.style.width = `${Math.max(4, item.count / max * 100)}%`; });
      });
    }

    function showError(error) {
      const chart = document.getElementById('chart');
      chart.innerHTML = `<div class="empty">차트를 불러오지 못했습니다.<br>${escapeHtml(error && error.message ? error.message : String(error))}</div>`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    }
  </script>
</body>
</html>

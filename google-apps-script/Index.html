<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --ink: #44375d;
      --muted: #817694;
      --purple: #8068b8;
      --purple-dark: #6d55a5;
      --purple-light: #eee7fb;
      --mint: #a9d8cd;
      --surface: rgba(255, 255, 255, 0.9);
      --line: rgba(101, 79, 140, 0.11);
      --shadow: 0 18px 44px rgba(78, 57, 116, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: transparent;
    }

    body {
      padding: 8px;
      color: var(--ink);
      font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
    }

    button, select { font: inherit; }

    .widget {
      width: 100%;
      max-width: 660px;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 28px;
      background:
        radial-gradient(circle at 96% 0%, rgba(170, 218, 207, 0.42), transparent 27%),
        linear-gradient(145deg, #f7f2ff 0%, #eee8fb 58%, #edf8f5 100%);
      box-shadow: var(--shadow);
    }

    .inner { padding: 22px; }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title-wrap { min-width: 0; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
      color: #766391;
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.06em;
    }

    .eyebrow-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 4px rgba(169, 216, 205, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1.2;
      letter-spacing: -0.045em;
    }

    .date-label {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .sync-button {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(111, 84, 156, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      color: #6f5898;
      cursor: pointer;
      font-size: 12px;
      font-weight: 850;
      box-shadow: 0 7px 18px rgba(85, 61, 125, 0.07);
      transition: transform 160ms ease, background 160ms ease;
    }

    .sync-button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #fff;
    }

    .sync-button:disabled {
      opacity: 0.58;
      cursor: default;
    }

    .sync-icon { font-size: 16px; line-height: 1; }
    .syncing .sync-icon { animation: spin 0.8s linear infinite; }

    .vote-box,
    .result-box {
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 10px 28px rgba(78, 57, 116, 0.07);
    }

    .vote-box { padding: 18px; }

    .section-title {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.025em;
    }

    .section-help {
      margin: 5px 0 13px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .vote-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 9px;
    }

    .select-wrap { position: relative; }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      top: 50%;
      right: 15px;
      color: #75638f;
      font-weight: 900;
      pointer-events: none;
      transform: translateY(-56%);
    }

    select {
      width: 100%;
      height: 48px;
      padding: 0 43px 0 15px;
      border: 1px solid rgba(102, 79, 140, 0.17);
      border-radius: 15px;
      outline: none;
      appearance: none;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
    }

    select:focus {
      border-color: #9b83c9;
      box-shadow: 0 0 0 4px rgba(155, 131, 201, 0.13);
    }

    .vote-button {
      min-width: 104px;
      height: 48px;
      padding: 0 18px;
      border: 0;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple));
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(109, 85, 165, 0.22);
    }

    .vote-button:disabled,
    select:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .vote-status {
      grid-column: 1 / -1;
      min-height: 18px;
      margin: 1px 2px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .vote-status.success { color: #39796c; font-weight: 800; }
    .vote-status.error { color: #a54862; font-weight: 800; }

    .results { margin-top: 12px; }

    .result-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 9px;
      padding: 0 3px;
    }

    .result-meta { text-align: right; }

    .result-meta strong {
      display: block;
      font-size: 13px;
    }

    .result-meta span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
    }

    .result-box { padding: 8px 14px; }

    .result-row {
      display: grid;
      grid-template-columns: 36px minmax(96px, 1.25fr) minmax(90px, 2.6fr) 66px;
      align-items: center;
      gap: 10px;
      min-height: 64px;
      border-bottom: 1px solid var(--line);
    }

    .result-row:last-child { border-bottom: 0; }

    .rank {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border-radius: 11px;
      background: linear-gradient(145deg, #7f67b7, #aa93d7);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 6px 14px rgba(105, 80, 151, 0.18);
    }

    .result-row:nth-child(2) .rank {
      background: linear-gradient(145deg, #9c86c7, #c5b4e4);
    }

    .result-row:nth-child(n + 3) .rank {
      background: linear-gradient(145deg, #87c5b8, #b9e1d8);
      color: #426f66;
    }

    .menu-name {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    .bar-track {
      height: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: #eee8f5;
    }

    .bar-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7c64b3, #b19bdc);
      transition: width 650ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .result-row:nth-child(n + 3) .bar-fill {
      background: linear-gradient(90deg, #87c5b8, #b9e1d8);
    }

    .score { text-align: right; }

    .score strong,
    .score span { display: block; }

    .score strong { font-size: 13px; }
    .score span { margin-top: 2px; color: var(--muted); font-size: 10px; }

    .empty {
      padding: 42px 16px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.65;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      body { padding: 5px; }
      .inner { padding: 17px; }
      .widget { border-radius: 23px; }
      .sync-button { min-width: 40px; padding: 0 11px; }
      .sync-text { display: none; }
      .vote-form { grid-template-columns: 1fr; }
      .vote-button { width: 100%; }
      .result-row {
        grid-template-columns: 34px minmax(0, 1fr) 58px;
        gap: 8px;
        padding: 8px 0;
      }
      .bar-track {
        grid-column: 2 / 4;
        margin-top: -7px;
      }
    }
  </style>
</head>
<body>
  <main class="widget">
    <div class="inner">
      <header class="topbar">
        <div class="title-wrap">
          <span class="eyebrow"><i class="eyebrow-dot"></i> YULLYANG LUNCH PICK</span>
          <h1>급식 인기투표</h1>
          <p class="date-label" id="voteDateLabel">급식 메뉴를 불러오고 있습니다.</p>
        </div>

        <button class="sync-button" id="syncButton" type="button" aria-label="급식 메뉴와 투표 결과 동기화">
          <span class="sync-icon">↻</span>
          <span class="sync-text">동기화</span>
        </button>
      </header>

      <section class="vote-box" aria-labelledby="voteTitle">
        <h2 class="section-title" id="voteTitle">오늘 기대되는 메뉴는?</h2>
        <p class="section-help" id="voteHelp">메뉴를 하나 선택해 투표해 주세요.</p>

        <form class="vote-form" id="voteForm">
          <div class="select-wrap">
            <label class="sr-only" for="menuSelect">기대되는 급식 메뉴 선택</label>
            <select id="menuSelect" name="menu" disabled>
              <option value="">메뉴를 불러오는 중입니다</option>
            </select>
          </div>

          <button class="vote-button" id="voteButton" type="submit" disabled>투표하기</button>
          <p class="vote-status" id="voteStatus" aria-live="polite"></p>
        </form>
      </section>

      <section class="results" aria-labelledby="resultTitle">
        <div class="result-head">
          <h2 class="section-title" id="resultTitle">투표 결과</h2>
          <div class="result-meta">
            <strong id="totalResponses">0명 참여</strong>
            <span id="updatedAt">불러오는 중</span>
          </div>
        </div>

        <div class="result-box" id="chart" aria-live="polite">
          <div class="empty">투표 결과를 불러오고 있어요.</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const REFRESH_INTERVAL_MS = 12 * 60 * 60 * 1000;

    let voteTargetDate = '';
    let voteSubmitting = false;
    let syncing = false;

    const syncButton = document.getElementById('syncButton');
    const voteForm = document.getElementById('voteForm');
    const menuSelect = document.getElementById('menuSelect');
    const voteButton = document.getElementById('voteButton');
    const voteStatus = document.getElementById('voteStatus');

    document.addEventListener('DOMContentLoaded', () => {
      syncButton.addEventListener('click', manualSync);
      voteForm.addEventListener('submit', submitVote);
      loadWidget();
      window.setInterval(() => {
        if (!document.hidden) loadWidget();
      }, REFRESH_INTERVAL_MS);
    });

    function loadWidget() {
      loadVotePanel();
      loadDashboard();
    }

    function manualSync() {
      if (syncing) return;
      syncing = true;
      setSyncing(true);
      setVoteStatus('', '');

      google.script.run
        .withSuccessHandler((result) => {
          syncing = false;
          setSyncing(false);
          if (result && result.vote) renderVotePanel(result.vote);
          if (result && result.dashboard) renderDashboard(result.dashboard);
          const source = result && result.sync && result.sync.source
            ? ` · ${result.sync.source}`
            : '';
          setVoteStatus(`동기화 완료${source}`, 'success');
        })
        .withFailureHandler((error) => {
          syncing = false;
          setSyncing(false);
          setVoteStatus(errorMessage(error), 'error');
        })
        .manualSyncMealWidget();
    }

    function setSyncing(active) {
      syncButton.disabled = active;
      syncButton.classList.toggle('syncing', active);
      const text = syncButton.querySelector('.sync-text');
      if (text) text.textContent = active ? '동기화 중' : '동기화';
    }

    function loadVotePanel() {
      google.script.run
        .withSuccessHandler(renderVotePanel)
        .withFailureHandler((error) => {
          disableVotePanel('투표 메뉴를 불러오지 못했습니다.');
          setVoteStatus(errorMessage(error), 'error');
        })
        .getVotePanelData();
    }

    function renderVotePanel(data) {
      voteTargetDate = data && data.date ? data.date : '';
      document.getElementById('voteDateLabel').textContent = data && data.dateLabel
        ? `${data.dateLabel} 투표`
        : '투표 준비 중';
      document.getElementById('voteHelp').textContent = data && data.message
        ? data.message
        : '메뉴를 하나 선택해 투표해 주세요.';

      menuSelect.replaceChildren();
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = data && data.available
        ? '기대되는 메뉴를 선택하세요'
        : '현재 투표할 수 없습니다';
      menuSelect.appendChild(placeholder);

      if (!data || !data.available || !Array.isArray(data.options)) {
        menuSelect.disabled = true;
        voteButton.disabled = true;
        return;
      }

      data.options.forEach((menu) => {
        const option = document.createElement('option');
        option.value = menu;
        option.textContent = menu;
        menuSelect.appendChild(option);
      });

      menuSelect.disabled = false;
      voteButton.disabled = false;
    }

    function disableVotePanel(message) {
      menuSelect.replaceChildren();
      const option = document.createElement('option');
      option.value = '';
      option.textContent = message;
      menuSelect.appendChild(option);
      menuSelect.disabled = true;
      voteButton.disabled = true;
    }

    function submitVote(event) {
      event.preventDefault();
      if (voteSubmitting) return;

      const menu = menuSelect.value;
      if (!menu) {
        setVoteStatus('메뉴를 하나 선택해 주세요.', 'error');
        return;
      }

      voteSubmitting = true;
      voteButton.disabled = true;
      voteButton.textContent = '제출 중';
      setVoteStatus('', '');

      google.script.run
        .withSuccessHandler((result) => {
          voteSubmitting = false;
          voteButton.disabled = false;
          voteButton.textContent = '투표하기';
          menuSelect.value = '';
          setVoteStatus(result && result.message ? result.message : '투표가 반영되었습니다.', 'success');
          window.setTimeout(loadDashboard, 700);
        })
        .withFailureHandler((error) => {
          voteSubmitting = false;
          voteButton.disabled = false;
          voteButton.textContent = '투표하기';
          setVoteStatus(errorMessage(error), 'error');
          loadVotePanel();
        })
        .submitMealVote({
          menu,
          targetDate: voteTargetDate
        });
    }

    function loadDashboard() {
      google.script.run
        .withSuccessHandler(renderDashboard)
        .withFailureHandler(showChartError)
        .getDashboardData();
    }

    function renderDashboard(data) {
      document.getElementById('totalResponses').textContent = `${Number(data && data.totalResponses || 0)}명 참여`;
      document.getElementById('updatedAt').textContent = `${data && data.updatedAt ? data.updatedAt : '-'} 기준`;

      const chart = document.getElementById('chart');
      chart.replaceChildren();

      if (!data || !Array.isArray(data.items) || data.items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '아직 투표가 없어요. 첫 번째 메뉴를 골라 주세요.';
        chart.appendChild(empty);
        return;
      }

      const maxCount = Math.max(
        ...data.items.map((item) => Number(item.count) || 0),
        1
      );

      data.items.forEach((item) => {
        const row = document.createElement('article');
        row.className = 'result-row';

        const rank = document.createElement('div');
        rank.className = 'rank';
        rank.textContent = String(item.rank);

        const name = document.createElement('div');
        name.className = 'menu-name';
        name.textContent = String(item.menu || '메뉴');

        const track = document.createElement('div');
        track.className = 'bar-track';

        const fill = document.createElement('div');
        fill.className = 'bar-fill';
        track.appendChild(fill);

        const score = document.createElement('div');
        score.className = 'score';

        const count = document.createElement('strong');
        count.textContent = `${Number(item.count) || 0}표`;

        const percentage = document.createElement('span');
        percentage.textContent = `${formatPercentage(item.percentage)}%`;

        score.append(count, percentage);
        row.append(rank, name, track, score);
        chart.appendChild(row);

        const width = Math.max(4, (Number(item.count) / maxCount) * 100);
        window.requestAnimationFrame(() => {
          fill.style.width = `${Math.min(width, 100)}%`;
        });
      });
    }

    function showChartError(error) {
      const chart = document.getElementById('chart');
      chart.replaceChildren();
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = `투표 결과를 불러오지 못했습니다. ${errorMessage(error)}`;
      chart.appendChild(empty);
    }

    function setVoteStatus(message, type) {
      voteStatus.textContent = message || '';
      voteStatus.className = `vote-status${type ? ` ${type}` : ''}`;
    }

    function errorMessage(error) {
      return error && error.message ? error.message : String(error || '알 수 없는 오류');
    }

    function formatPercentage(value) {
      const number = Number(value || 0);
      return Number.isInteger(number) ? String(number) : number.toFixed(1);
    }
  </script>
</body>
</html>
